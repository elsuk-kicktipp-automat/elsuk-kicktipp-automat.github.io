# Konfiguration für "Der Automat"
#
# Aktiver Wettbewerb: WM 2026 (Test-/Härtungsbetrieb bis 19.07.2026).
# Für den Bundesliga-Betrieb ab August 2026 umstellen auf:
#   competition: bl1
#   leagues: [bl1]
#   season: 2026
#   team_type: club
#   neutral_venue: false
competition: wm26
# 'wm26' ist eine einzelne, durchgehend gepflegte OpenLigaDB-Liga für das
# gesamte Turnier (Gruppenphase bis Finale, stabile Team-IDs, korrekt und
# zeitnah aktualisiert) - abgelöst wurde die frühere Kombination aus
# 'wm2026' (Gruppenphase) + 'mb' (K.o.-Runde), die teils unterschiedliche
# Team-IDs/Schreibweisen hatte und bei einzelnen Spielen hinterherhinkte.
leagues: [wm26]
season: 2026
team_type: national # wählt den ELO-Adapter: club (clubelo.com) | national (eloratings.net)
neutral_venue: true # WM: kein Heimvorteil

kicktipp:
  # Punkteschema der Runde (Standard 4/3/2). Bei Unentschieden gibt es keine
  # Tordifferenz-Punkte, nur exakt oder Tendenz (Kicktipp-Standard).
  points:
    exact: 4
    goal_diff: 3
    tendency: 2
    # Zusatzfrage bei K.o.-Spielen: "Wer kommt weiter?" (0 = Runde wertet das
    # nicht). Wird separat ausgewiesen, nicht in points_total eingerechnet.
    advance: 2

model:
  # Zeitgewichtung: Gewicht = exp(-xi * Tage seit Spiel). 0.002/Tag ≈ Halbwertszeit ~1 Jahr.
  time_decay_xi: 0.002
  # L2-Regularisierung der Team-Parameter (hält Teams mit wenig Daten nahe am
  # Ligaschnitt), pro team_type: Nationalteams haben nur 3-7 Turnierspiele und
  # brauchen deutlich stärkere Shrinkage, sonst übertönen überangepasste
  # Team-Parameter den ELO-Term (im WM-Backtest gemessen: Plateau bei 5-12).
  # Vereine (60+ Spiele): flach zwischen 0.2 und 1.0.
  l2_penalty:
    club: 0.2
    national: 5.0
  # Tor-Raster der Wahrscheinlichkeitsmatrix: 0:0 bis 6:6
  max_goals: 6
  # Kandidaten-Tipps: 0..max_tip_goals pro Team
  max_tip_goals: 5
  elo:
    enabled: true
    # Prior für beta (log-Tor-Verhältnis pro 100 Punkte ELO-Differenz);
    # wird mitgeschätzt und zum Prior regularisiert
    beta_prior: 0.15
    beta_penalty: 50.0

# Buchmacherquoten als Live-Prior (concept.md §3). Kein historischer Endpunkt
# im Free Tier -> nur zur Vorhersagezeit angewendet (engine/market.py), nie im
# Backtest (dort bliebe der Quoten-Anteil sonst unfair "aus der Zukunft").
odds:
  enabled: true
  # Sport-Key von The Odds API - bei Wettbewerbswechsel prüfen/anpassen:
  # https://the-odds-api.com/liveapi/guides/v4/#sports
  sport_key: soccer_fifa_world_cup # Bundesliga: soccer_germany_bundesliga
  regions: eu
  # Gewicht der Marktquote beim Blend mit der Modellmeinung (1.0 = nur Markt)
  market_weight: 0.7

# Paper-Betting: rein theoretische 1X2-Wetten, keine echte Wettabgabe.
# Vorzug: Tipico DE. Falls nicht vorhanden, nutzt die Engine den Marktdurchschnitt
# aller von The Odds API gelieferten Bookmaker und weist die Quelle transparent aus.
paper_betting:
  enabled: true
  market: h2h_90min
  provider_preference:
    - tipico_de
  fallback: average_market
  staking:
    mode: fractional_kelly
    bankroll_eur: 1000
    kelly_fraction: 0.25
    max_stake_eur: 100
    min_edge: 0.02
    min_stake_eur: 0

llm:
  enabled: true
  provider: groq
  model: llama-3.3-70b-versatile
  # Schatten-Anpassungsvorschlag (concept.md Schicht 3, Teil 1): läuft NUR
  # geloggt/bewertet mit (siehe evaluate.py "llm_adjusted"), ändert NIE den
  # echten Tipp. Ob er irgendwann scharf geschaltet wird, entscheidet der
  # Vertrauensregler in engine/learn.py anhand der gesammelten Punkte.
  adjustment:
    enabled: true
    max_news_age_days: 5 # RSS-Schlagzeilen älter als das zählen nicht mehr

# Tipp-Timing: Spiele werden erst getippt/versiegelt/eingetragen, wenn ihr
# Anstoß höchstens tip_window_hours entfernt ist - so fließen tagesaktuelle
# News und Quotenbewegungen (z.B. kurzfristige Ausfälle) noch in den Tipp ein.
# Untergrenze safety_margin_minutes: so knapp vor (oder nach) Anstoß wird
# nicht mehr getippt - schützt den Fairness-Mechanismus (Tipp steht nachweislich
# vor Anstoß fest) und lässt der Kette predict->seal->commit->Kicktipp Luft.
# Fenstergröße ist an GitHubs Cron-Zuverlässigkeit bemessen (beobachtete
# Verspätungen bis ~2,5h): stündlicher Lauf + 4h-Fenster = ~4 Versuche pro Spiel.
timing:
  tip_window_hours: 4
  safety_margin_minutes: 20

# Kicktipp-Abgabe (concept.md Phase 4): trägt die Tipps automatisch bei
# kicktipp.de ein. Zugangsdaten und Rundenname kommen ausschließlich aus
# GitHub Actions Secrets (KICKTIPP_EMAIL/PASSWORD/RUNDE), nie hier - die
# Runde bleibt damit auch bei einem öffentlichen Repo nicht direkt auffindbar.
kicktipp_submission:
  enabled: true
  # Scharf geschaltet nach erfolgreichem Dry-Run-Test (Login, Rundennavigation
  # und alle 8 Achtelfinale-Paarungen korrekt zugeordnet/befüllt, 04.07.2026).
  # Solange true: Formular wird nur ausgefüllt/screenshottet, nicht abgeschickt.
  dry_run: false

backtest:
  # Vereinsfußball: rollierend über die letzten 3 Bundesliga-Saisons
  club:
    competition: bl1
    leagues: [bl1]
    seasons: [2023, 2024, 2025]
    lookback_seasons: 2 # Vorsaisons als Trainings-Warmup
    team_type: club
    neutral_venue: false
  # WM 2026: Gruppenphase + bisherige K.o.-Spiele als Out-of-Sample-Test
  national:
    competition: wm26
    leagues: [wm26]
    season: 2026
    team_type: national
    neutral_venue: true
