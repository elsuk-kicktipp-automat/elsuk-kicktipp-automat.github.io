# Täglicher Spieltags-Lauf: Prognose für die nächste Runde, Versiegelung
# (nur Hashes werden öffentlich), Punkteabrechnung der enthüllten Tipps.
name: Spieltag

on:
  schedule:
    - cron: '0 6 * * *' # täglich 06:00 UTC, deutlich vor den WM-Anstoßzeiten
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-updates

jobs:
  spieltag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Prognose (idempotent pro Runde)
        run: python -m engine.cli predict
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Playwright-Browser installieren
        run: playwright install --with-deps chromium

      # Läuft VOR dem Versiegeln (das die Klartext-Datei danach löscht).
      # Dry-Run/Live per config.yaml (kicktipp_submission.dry_run) - Details
      # zu befüllten Tipps werden bewusst nicht geloggt (öffentliches Repo).
      - name: Kicktipp-Tippabgabe
        run: python -m engine.cli kicktipp
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_RUNDE: ${{ secrets.KICKTIPP_RUNDE }}

      - name: Versiegeln
        run: python -m engine.cli seal
        env:
          SEAL_SECRET: ${{ secrets.SEAL_SECRET }}

      - name: Punkteabrechnung
        run: python -m engine.cli evaluate

      - name: Änderungen committen
        id: commit
        run: |
          git config user.name "der-automat[bot]"
          git config user.email "noreply@github.com"
          # data/ pauschal: explizite Pfade schlagen fehl, solange z.B.
          # data/sealed/ noch nicht existiert (cache/predictions sind gitignored)
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Spieltags-Update $(date -u +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes mit GITHUB_TOKEN lösen keine push-Workflows aus,
      # deshalb wird der Site-Deploy explizit angestoßen.
      - name: Site-Deploy anstoßen
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy-site.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
