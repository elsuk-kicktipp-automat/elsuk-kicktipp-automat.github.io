# Stündlicher Spieltags-Lauf: prognostiziert/versiegelt Spiele, deren Anstoß
# ins Tipp-Fenster fällt (config.yaml: timing), rechnet Enthülltes ab und
# trägt versiegelte Tipps bei Kicktipp ein.
#
# Reihenfolge ist Teil des Fairness-Mechanismus: erst versiegeln und den
# Hash-Beweis committen/pushen, DANN bei Kicktipp eintragen (aus den
# verschlüsselten .enc-Dateien). Schlägt die Abgabe fehl, existiert der
# öffentliche Beweis trotzdem schon - und der rote Lauf löst GitHubs
# Fehlerbenachrichtigung aus (concept.md §6).
name: Spieltag

on:
  schedule:
    - cron: '0 * * * *' # stündlich: Tipp-Fenster (4h) braucht mehrere Versuche,
                        # GitHub-Crons feuern erfahrungsgemäß bis zu ~2,5h verspätet
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-updates

jobs:
  spieltag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Prognose (Spiele im Tipp-Fenster)
        run: python -m engine.cli predict
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Versiegeln
        run: python -m engine.cli seal
        env:
          SEAL_SECRET: ${{ secrets.SEAL_SECRET }}

      - name: Punkteabrechnung
        run: python -m engine.cli evaluate

      - name: Änderungen committen
        id: commit
        run: |
          git config user.name "der-automat[bot]"
          git config user.email "noreply@github.com"
          # data/ pauschal: explizite Pfade schlagen fehl, solange z.B.
          # data/sealed/ noch nicht existiert (cache/predictions sind gitignored)
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Spieltags-Update $(date -u '+%F %H:%M') UTC"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes mit GITHUB_TOKEN lösen keine push-Workflows aus,
      # deshalb wird der Site-Deploy explizit angestoßen.
      - name: Site-Deploy anstoßen
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy-site.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}

      # Kicktipp-Abgabe NACH dem Fairness-Commit; Browser-Arbeit nur, wenn
      # überhaupt versiegelte Tipps vorliegen (sonst endet der Lauf hier).
      - name: Prüfen, ob versiegelte Tipps vorliegen
        id: pending
        run: |
          if ls data/sealed/*.enc >/dev/null 2>&1; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Playwright-Browser installieren
        if: steps.pending.outputs.pending == 'true'
        run: playwright install --with-deps chromium

      - name: Kicktipp-Tippabgabe (verifiziert, schlägt bei Anomalien fehl)
        if: steps.pending.outputs.pending == 'true'
        run: python -m engine.cli kicktipp
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_RUNDE: ${{ secrets.KICKTIPP_RUNDE }}
          SEAL_SECRET: ${{ secrets.SEAL_SECRET }}
