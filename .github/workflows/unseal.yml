# Entsiegelt Tipps ab Anstoß und rechnet direkt ab.
# Läuft alle 5 Minuten; ohne fällige Spiele endet der Job nach Sekunden.
name: Entsiegeln

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-updates

jobs:
  unseal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prüfen, ob etwas fällig ist
        id: check
        run: |
          pending=false
          now=$(date -u +%s)
          for f in data/matchdays/*.json; do
            if ls data/sealed/*.enc >/dev/null 2>&1 && jq -e --argjson now "$now" \
              '[.matches[] | select(.status == "sealed") | .kickoff_utc | fromdateiso8601] | any(. <= $now)' \
              "$f" >/dev/null; then
              pending=true
              break
            fi

            result_file="data/results/$(basename "$f")"
            if jq -e --argjson now "$now" \
              '[.matches[] | select(.status == "revealed") | select((.kickoff_utc | fromdateiso8601) + 5400 <= $now)] | length > 0' \
              "$f" >/dev/null; then
              if [ ! -f "$result_file" ] || jq -e \
                '[.matches[] | select(.status == "revealed") | select((.result // null) == null)] | length > 0' \
                "$result_file" >/dev/null; then
                pending=true
                break
              fi
            fi
          done

          # Kombiwette fällig? (versiegelt und letzter Anstoß erreicht)
          if [ "$pending" = "false" ] && ls data/kombi/*.enc >/dev/null 2>&1; then
            for k in data/kombi/*.json; do
              if jq -e --argjson now "$now" \
                'select(.status == "sealed") | (.reveal_after_utc | fromdateiso8601) <= $now' \
                "$k" >/dev/null; then
                pending=true
                break
              fi
            done
          fi
          echo "pending=$pending" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.check.outputs.pending == 'true'
        with:
          python-version: '3.12'
          cache: pip

      - if: steps.check.outputs.pending == 'true'
        run: pip install -r requirements.txt

      - name: Entsiegeln
        if: steps.check.outputs.pending == 'true'
        run: python -m engine.cli unseal
        env:
          SEAL_SECRET: ${{ secrets.SEAL_SECRET }}

      - name: Punkteabrechnung
        if: steps.check.outputs.pending == 'true'
        run: python -m engine.cli evaluate

      - name: Änderungen committen
        id: commit
        if: steps.check.outputs.pending == 'true'
        run: |
          git config user.name "der-automat[bot]"
          git config user.email "noreply@github.com"
          # data/ pauschal: explizite Pfade schlagen fehl, solange z.B.
          # data/sealed/ noch nicht existiert (cache/predictions sind gitignored)
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Tipps entsiegelt $(date -u '+%F %H:%M') UTC"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Site-Deploy anstoßen
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy-site.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
